name: Deployed Smoke

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment to validate
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      candidate_run_id:
        description: CI workflow run id that published the candidate API image manifest
        required: true
        type: string

jobs:
  staging-smoke:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deployed-smoke-staging
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
    env:
      DEPLOYMENT_TARGET_ENVIRONMENT: staging
    steps:
      - name: Download API image manifest
        uses: actions/download-artifact@v4
        with:
          name: api-image-manifest
          path: ${{ runner.temp }}/api-image-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read candidate image manifest
        id: candidate_manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/api-image-manifest/manifest.json`, 'utf8'));
            core.setOutput('commit_sha', manifest.commitSha);
            core.setOutput('git_ref', manifest.gitRef || '');
            core.setOutput('run_url', manifest.runUrl || '');
            core.setOutput('image_digest', manifest.image.digest);
            core.setOutput('image_reference', manifest.image.canonicalReference || '');

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.candidate_manifest.outputs.commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Resolve API image manifest
        run: |
          node ./scripts/api-image-manifest.mjs resolve \
            --manifest "${{ runner.temp }}/api-image-manifest/manifest.json" \
            --expected-repository "${{ github.repository }}" \
            --expected-commit-sha "${{ github.event.workflow_run.head_sha }}" \
            --expected-run-id "${{ github.event.workflow_run.id }}"

      - name: Build API artifacts
        run: pnpm --filter escrow4334-api build

      - name: Check migration posture
        run: pnpm --filter escrow4334-api db:migrate:status

      - name: Run deployment validation
        run: pnpm --filter escrow4334-api deployment:validate

      - name: Run deployed smoke tests
        id: deployed_smoke
        run: pnpm smoke:deployed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_ACCESS_TTL_SEC: ${{ secrets.JWT_ACCESS_TTL_SEC }}
          JWT_REFRESH_TTL_SEC: ${{ secrets.JWT_REFRESH_TTL_SEC }}
          AUTH_SESSION_TTL_SEC: ${{ secrets.AUTH_SESSION_TTL_SEC }}
          AUTH_OTP_TTL_SEC: ${{ secrets.AUTH_OTP_TTL_SEC }}
          AUTH_OTP_VERIFY_MAX_ATTEMPTS: ${{ secrets.AUTH_OTP_VERIFY_MAX_ATTEMPTS }}
          AUTH_OTP_LOCK_SEC: ${{ secrets.AUTH_OTP_LOCK_SEC }}
          AUTH_OTP_SEND_WINDOW_SEC: ${{ secrets.AUTH_OTP_SEND_WINDOW_SEC }}
          AUTH_OTP_SEND_MAX_PER_WINDOW: ${{ secrets.AUTH_OTP_SEND_MAX_PER_WINDOW }}
          AUTH_OTP_IP_SEND_WINDOW_SEC: ${{ secrets.AUTH_OTP_IP_SEND_WINDOW_SEC }}
          AUTH_OTP_IP_SEND_MAX_PER_WINDOW: ${{ secrets.AUTH_OTP_IP_SEND_MAX_PER_WINDOW }}
          NEST_API_TRUST_PROXY: ${{ secrets.NEST_API_TRUST_PROXY }}
          AUTH_EMAIL_MODE: ${{ secrets.AUTH_EMAIL_MODE }}
          AUTH_EMAIL_FROM_EMAIL: ${{ secrets.AUTH_EMAIL_FROM_EMAIL }}
          AUTH_EMAIL_FROM_NAME: ${{ secrets.AUTH_EMAIL_FROM_NAME }}
          AUTH_EMAIL_REPLY_TO: ${{ secrets.AUTH_EMAIL_REPLY_TO }}
          AUTH_EMAIL_RELAY_BASE_URL: ${{ secrets.AUTH_EMAIL_RELAY_BASE_URL }}
          AUTH_EMAIL_RELAY_API_KEY: ${{ secrets.AUTH_EMAIL_RELAY_API_KEY }}
          AUTH_EMAIL_OTP_SUBJECT: ${{ secrets.AUTH_EMAIL_OTP_SUBJECT }}
          WALLET_SMART_ACCOUNT_MODE: ${{ secrets.WALLET_SMART_ACCOUNT_MODE }}
          WALLET_SMART_ACCOUNT_CHAIN_ID: ${{ secrets.WALLET_SMART_ACCOUNT_CHAIN_ID }}
          WALLET_SMART_ACCOUNT_ENTRY_POINT_ADDRESS: ${{ secrets.WALLET_SMART_ACCOUNT_ENTRY_POINT_ADDRESS }}
          WALLET_SMART_ACCOUNT_FACTORY_ADDRESS: ${{ secrets.WALLET_SMART_ACCOUNT_FACTORY_ADDRESS }}
          WALLET_SMART_ACCOUNT_BUNDLER_URL: ${{ secrets.WALLET_SMART_ACCOUNT_BUNDLER_URL }}
          WALLET_SMART_ACCOUNT_RELAY_BASE_URL: ${{ secrets.WALLET_SMART_ACCOUNT_RELAY_BASE_URL }}
          WALLET_SMART_ACCOUNT_RELAY_API_KEY: ${{ secrets.WALLET_SMART_ACCOUNT_RELAY_API_KEY }}
          WALLET_SMART_ACCOUNT_SPONSORSHIP_MODE: ${{ secrets.WALLET_SMART_ACCOUNT_SPONSORSHIP_MODE }}
          WALLET_SMART_ACCOUNT_PAYMASTER_URL: ${{ secrets.WALLET_SMART_ACCOUNT_PAYMASTER_URL }}
          ESCROW_CONTRACT_MODE: ${{ secrets.ESCROW_CONTRACT_MODE }}
          ESCROW_CHAIN_ID: ${{ secrets.ESCROW_CHAIN_ID }}
          ESCROW_CONTRACT_ADDRESS: ${{ secrets.ESCROW_CONTRACT_ADDRESS }}
          ESCROW_ARBITRATOR_ADDRESS: ${{ secrets.ESCROW_ARBITRATOR_ADDRESS }}
          ESCROW_RELAY_BASE_URL: ${{ secrets.ESCROW_RELAY_BASE_URL }}
          ESCROW_RELAY_API_KEY: ${{ secrets.ESCROW_RELAY_API_KEY }}
          OPERATIONS_ESCROW_RPC_URL: ${{ secrets.OPERATIONS_ESCROW_RPC_URL }}
          OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_REQUIRED: ${{ secrets.OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_REQUIRED }}
          OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_ALERT_WEBHOOK_URL: ${{ secrets.OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_ALERT_WEBHOOK_URL }}
          PLAYWRIGHT_DEPLOYED_WEB_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_WEB_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_ADMIN_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_ADMIN_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_API_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_API_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_EXPECT_PROFILE: ${{ secrets.PLAYWRIGHT_DEPLOYED_EXPECT_PROFILE }}
          PLAYWRIGHT_DEPLOYED_AUDIT_JOB_ID: ${{ secrets.PLAYWRIGHT_DEPLOYED_AUDIT_JOB_ID }}
          PLAYWRIGHT_DEPLOYED_ALLOW_INSECURE_HTTP: ${{ secrets.PLAYWRIGHT_DEPLOYED_ALLOW_INSECURE_HTTP }}
          PLAYWRIGHT_DEPLOYED_ALLOW_LOCALHOST: ${{ secrets.PLAYWRIGHT_DEPLOYED_ALLOW_LOCALHOST }}

      - name: Validate deployed canary secret contract
        run: node ./scripts/assert-deployed-flow-env.mjs
        env:
          PLAYWRIGHT_DEPLOYED_FLOW_CURRENCY_ADDRESS: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CURRENCY_ADDRESS }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_PRIVATE_KEY }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_PRIVATE_KEY }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_PRIVATE_KEY }}

      - name: Run seeded deployed canary
        id: seeded_canary
        run: pnpm e2e:canary:deployed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_ACCESS_TTL_SEC: ${{ secrets.JWT_ACCESS_TTL_SEC }}
          JWT_REFRESH_TTL_SEC: ${{ secrets.JWT_REFRESH_TTL_SEC }}
          AUTH_SESSION_TTL_SEC: ${{ secrets.AUTH_SESSION_TTL_SEC }}
          AUTH_OTP_TTL_SEC: ${{ secrets.AUTH_OTP_TTL_SEC }}
          AUTH_OTP_VERIFY_MAX_ATTEMPTS: ${{ secrets.AUTH_OTP_VERIFY_MAX_ATTEMPTS }}
          AUTH_OTP_LOCK_SEC: ${{ secrets.AUTH_OTP_LOCK_SEC }}
          AUTH_OTP_SEND_WINDOW_SEC: ${{ secrets.AUTH_OTP_SEND_WINDOW_SEC }}
          AUTH_OTP_SEND_MAX_PER_WINDOW: ${{ secrets.AUTH_OTP_SEND_MAX_PER_WINDOW }}
          AUTH_OTP_IP_SEND_WINDOW_SEC: ${{ secrets.AUTH_OTP_IP_SEND_WINDOW_SEC }}
          AUTH_OTP_IP_SEND_MAX_PER_WINDOW: ${{ secrets.AUTH_OTP_IP_SEND_MAX_PER_WINDOW }}
          NEST_API_TRUST_PROXY: ${{ secrets.NEST_API_TRUST_PROXY }}
          AUTH_EMAIL_MODE: ${{ secrets.AUTH_EMAIL_MODE }}
          AUTH_EMAIL_FROM_EMAIL: ${{ secrets.AUTH_EMAIL_FROM_EMAIL }}
          AUTH_EMAIL_FROM_NAME: ${{ secrets.AUTH_EMAIL_FROM_NAME }}
          AUTH_EMAIL_REPLY_TO: ${{ secrets.AUTH_EMAIL_REPLY_TO }}
          AUTH_EMAIL_RELAY_BASE_URL: ${{ secrets.AUTH_EMAIL_RELAY_BASE_URL }}
          AUTH_EMAIL_RELAY_API_KEY: ${{ secrets.AUTH_EMAIL_RELAY_API_KEY }}
          AUTH_EMAIL_OTP_SUBJECT: ${{ secrets.AUTH_EMAIL_OTP_SUBJECT }}
          WALLET_SMART_ACCOUNT_MODE: ${{ secrets.WALLET_SMART_ACCOUNT_MODE }}
          WALLET_SMART_ACCOUNT_CHAIN_ID: ${{ secrets.WALLET_SMART_ACCOUNT_CHAIN_ID }}
          WALLET_SMART_ACCOUNT_ENTRY_POINT_ADDRESS: ${{ secrets.WALLET_SMART_ACCOUNT_ENTRY_POINT_ADDRESS }}
          WALLET_SMART_ACCOUNT_FACTORY_ADDRESS: ${{ secrets.WALLET_SMART_ACCOUNT_FACTORY_ADDRESS }}
          WALLET_SMART_ACCOUNT_BUNDLER_URL: ${{ secrets.WALLET_SMART_ACCOUNT_BUNDLER_URL }}
          WALLET_SMART_ACCOUNT_RELAY_BASE_URL: ${{ secrets.WALLET_SMART_ACCOUNT_RELAY_BASE_URL }}
          WALLET_SMART_ACCOUNT_RELAY_API_KEY: ${{ secrets.WALLET_SMART_ACCOUNT_RELAY_API_KEY }}
          WALLET_SMART_ACCOUNT_SPONSORSHIP_MODE: ${{ secrets.WALLET_SMART_ACCOUNT_SPONSORSHIP_MODE }}
          WALLET_SMART_ACCOUNT_PAYMASTER_URL: ${{ secrets.WALLET_SMART_ACCOUNT_PAYMASTER_URL }}
          ESCROW_CONTRACT_MODE: ${{ secrets.ESCROW_CONTRACT_MODE }}
          ESCROW_CHAIN_ID: ${{ secrets.ESCROW_CHAIN_ID }}
          ESCROW_CONTRACT_ADDRESS: ${{ secrets.ESCROW_CONTRACT_ADDRESS }}
          ESCROW_ARBITRATOR_ADDRESS: ${{ secrets.ESCROW_ARBITRATOR_ADDRESS }}
          ESCROW_RELAY_BASE_URL: ${{ secrets.ESCROW_RELAY_BASE_URL }}
          ESCROW_RELAY_API_KEY: ${{ secrets.ESCROW_RELAY_API_KEY }}
          OPERATIONS_ESCROW_RPC_URL: ${{ secrets.OPERATIONS_ESCROW_RPC_URL }}
          OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_REQUIRED: ${{ secrets.OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_REQUIRED }}
          OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_ALERT_WEBHOOK_URL: ${{ secrets.OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_ALERT_WEBHOOK_URL }}
          PLAYWRIGHT_DEPLOYED_WEB_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_WEB_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_ADMIN_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_ADMIN_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_API_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_API_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_EXPECT_PROFILE: ${{ secrets.PLAYWRIGHT_DEPLOYED_EXPECT_PROFILE }}
          PLAYWRIGHT_DEPLOYED_AUDIT_JOB_ID: ${{ secrets.PLAYWRIGHT_DEPLOYED_AUDIT_JOB_ID }}
          PLAYWRIGHT_DEPLOYED_ALLOW_INSECURE_HTTP: ${{ secrets.PLAYWRIGHT_DEPLOYED_ALLOW_INSECURE_HTTP }}
          PLAYWRIGHT_DEPLOYED_ALLOW_LOCALHOST: ${{ secrets.PLAYWRIGHT_DEPLOYED_ALLOW_LOCALHOST }}
          PLAYWRIGHT_DEPLOYED_FLOW_CURRENCY_ADDRESS: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CURRENCY_ADDRESS }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_PRIVATE_KEY }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_PRIVATE_KEY }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_PRIVATE_KEY }}

      - name: Run marketplace seeded deployed canary
        id: marketplace_seeded_canary
        run: pnpm e2e:canary:deployed:marketplace:seeded
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_ACCESS_TTL_SEC: ${{ secrets.JWT_ACCESS_TTL_SEC }}
          JWT_REFRESH_TTL_SEC: ${{ secrets.JWT_REFRESH_TTL_SEC }}
          AUTH_SESSION_TTL_SEC: ${{ secrets.AUTH_SESSION_TTL_SEC }}
          AUTH_OTP_TTL_SEC: ${{ secrets.AUTH_OTP_TTL_SEC }}
          AUTH_OTP_VERIFY_MAX_ATTEMPTS: ${{ secrets.AUTH_OTP_VERIFY_MAX_ATTEMPTS }}
          AUTH_OTP_LOCK_SEC: ${{ secrets.AUTH_OTP_LOCK_SEC }}
          AUTH_OTP_SEND_WINDOW_SEC: ${{ secrets.AUTH_OTP_SEND_WINDOW_SEC }}
          AUTH_OTP_SEND_MAX_PER_WINDOW: ${{ secrets.AUTH_OTP_SEND_MAX_PER_WINDOW }}
          AUTH_OTP_IP_SEND_WINDOW_SEC: ${{ secrets.AUTH_OTP_IP_SEND_WINDOW_SEC }}
          AUTH_OTP_IP_SEND_MAX_PER_WINDOW: ${{ secrets.AUTH_OTP_IP_SEND_MAX_PER_WINDOW }}
          NEST_API_TRUST_PROXY: ${{ secrets.NEST_API_TRUST_PROXY }}
          AUTH_EMAIL_MODE: ${{ secrets.AUTH_EMAIL_MODE }}
          AUTH_EMAIL_FROM_EMAIL: ${{ secrets.AUTH_EMAIL_FROM_EMAIL }}
          AUTH_EMAIL_FROM_NAME: ${{ secrets.AUTH_EMAIL_FROM_NAME }}
          AUTH_EMAIL_REPLY_TO: ${{ secrets.AUTH_EMAIL_REPLY_TO }}
          AUTH_EMAIL_RELAY_BASE_URL: ${{ secrets.AUTH_EMAIL_RELAY_BASE_URL }}
          AUTH_EMAIL_RELAY_API_KEY: ${{ secrets.AUTH_EMAIL_RELAY_API_KEY }}
          AUTH_EMAIL_OTP_SUBJECT: ${{ secrets.AUTH_EMAIL_OTP_SUBJECT }}
          WALLET_SMART_ACCOUNT_MODE: ${{ secrets.WALLET_SMART_ACCOUNT_MODE }}
          WALLET_SMART_ACCOUNT_CHAIN_ID: ${{ secrets.WALLET_SMART_ACCOUNT_CHAIN_ID }}
          WALLET_SMART_ACCOUNT_ENTRY_POINT_ADDRESS: ${{ secrets.WALLET_SMART_ACCOUNT_ENTRY_POINT_ADDRESS }}
          WALLET_SMART_ACCOUNT_FACTORY_ADDRESS: ${{ secrets.WALLET_SMART_ACCOUNT_FACTORY_ADDRESS }}
          WALLET_SMART_ACCOUNT_BUNDLER_URL: ${{ secrets.WALLET_SMART_ACCOUNT_BUNDLER_URL }}
          WALLET_SMART_ACCOUNT_RELAY_BASE_URL: ${{ secrets.WALLET_SMART_ACCOUNT_RELAY_BASE_URL }}
          WALLET_SMART_ACCOUNT_RELAY_API_KEY: ${{ secrets.WALLET_SMART_ACCOUNT_RELAY_API_KEY }}
          WALLET_SMART_ACCOUNT_SPONSORSHIP_MODE: ${{ secrets.WALLET_SMART_ACCOUNT_SPONSORSHIP_MODE }}
          WALLET_SMART_ACCOUNT_PAYMASTER_URL: ${{ secrets.WALLET_SMART_ACCOUNT_PAYMASTER_URL }}
          ESCROW_CONTRACT_MODE: ${{ secrets.ESCROW_CONTRACT_MODE }}
          ESCROW_CHAIN_ID: ${{ secrets.ESCROW_CHAIN_ID }}
          ESCROW_CONTRACT_ADDRESS: ${{ secrets.ESCROW_CONTRACT_ADDRESS }}
          ESCROW_ARBITRATOR_ADDRESS: ${{ secrets.ESCROW_ARBITRATOR_ADDRESS }}
          ESCROW_RELAY_BASE_URL: ${{ secrets.ESCROW_RELAY_BASE_URL }}
          ESCROW_RELAY_API_KEY: ${{ secrets.ESCROW_RELAY_API_KEY }}
          OPERATIONS_ESCROW_RPC_URL: ${{ secrets.OPERATIONS_ESCROW_RPC_URL }}
          OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_REQUIRED: ${{ secrets.OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_REQUIRED }}
          OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_ALERT_WEBHOOK_URL: ${{ secrets.OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_ALERT_WEBHOOK_URL }}
          PLAYWRIGHT_DEPLOYED_WEB_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_WEB_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_ADMIN_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_ADMIN_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_API_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_API_BASE_URL }}
          PLAYWRIGHT_DEPLOYED_EXPECT_PROFILE: ${{ secrets.PLAYWRIGHT_DEPLOYED_EXPECT_PROFILE }}
          PLAYWRIGHT_DEPLOYED_AUDIT_JOB_ID: ${{ secrets.PLAYWRIGHT_DEPLOYED_AUDIT_JOB_ID }}
          PLAYWRIGHT_DEPLOYED_ALLOW_INSECURE_HTTP: ${{ secrets.PLAYWRIGHT_DEPLOYED_ALLOW_INSECURE_HTTP }}
          PLAYWRIGHT_DEPLOYED_ALLOW_LOCALHOST: ${{ secrets.PLAYWRIGHT_DEPLOYED_ALLOW_LOCALHOST }}
          PLAYWRIGHT_DEPLOYED_FLOW_CURRENCY_ADDRESS: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CURRENCY_ADDRESS }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_PRIVATE_KEY }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_PRIVATE_KEY }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_EMAIL }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_OTP_CODE }}
          PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_PRIVATE_KEY }}

      - name: Generate deployed smoke review artifact
        if: ${{ always() }}
        run: node ./scripts/promotion-review.mjs smoke-record --output-dir artifacts/deployed-smoke-review
        env:
          DEPLOYED_SMOKE_ENVIRONMENT: staging
          DEPLOYED_SMOKE_REPOSITORY: ${{ github.repository }}
          DEPLOYED_SMOKE_WORKFLOW: ${{ github.workflow }}
          DEPLOYED_SMOKE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOYED_SMOKE_ACTOR: ${{ github.actor }}
          DEPLOYED_SMOKE_CANDIDATE_RUN_ID: ${{ github.event.workflow_run.id }}
          DEPLOYED_SMOKE_CANDIDATE_RUN_URL: ${{ steps.candidate_manifest.outputs.run_url }}
          DEPLOYED_SMOKE_COMMIT_SHA: ${{ steps.candidate_manifest.outputs.commit_sha }}
          DEPLOYED_SMOKE_GIT_REF: ${{ steps.candidate_manifest.outputs.git_ref }}
          DEPLOYED_SMOKE_DEPLOYED_IMAGE_SHA: ${{ steps.candidate_manifest.outputs.image_digest }}
          DEPLOYED_SMOKE_DEPLOYED_IMAGE_REFERENCE: ${{ steps.candidate_manifest.outputs.image_reference }}
          DEPLOYED_SMOKE_PASSED: ${{ steps.deployed_smoke.outcome == 'success' }}
          DEPLOYED_SMOKE_SEEDED_CANARY_PASSED: ${{ steps.seeded_canary.outcome == 'success' }}
          DEPLOYED_SMOKE_MARKETPLACE_SEEDED_CANARY_PASSED: ${{ steps.marketplace_seeded_canary.outcome == 'success' }}

      - name: Upload deployed smoke review artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: deployed-smoke-review-staging-candidate-${{ github.event.workflow_run.id }}
          path: artifacts/deployed-smoke-review
          if-no-files-found: error

  manual-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deployed-smoke-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
    env:
      DEPLOYMENT_TARGET_ENVIRONMENT: ${{ inputs.environment }}
    steps:
      - name: Download API image manifest
        uses: actions/download-artifact@v4
        with:
          name: api-image-manifest
          path: ${{ runner.temp }}/api-image-manifest
          run-id: ${{ inputs.candidate_run_id }}
          github-token: ${{ github.token }}

      - name: Read candidate image manifest
        id: candidate_manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/api-image-manifest/manifest.json`, 'utf8'));
            core.setOutput('commit_sha', manifest.commitSha);
            core.setOutput('git_ref', manifest.gitRef || '');
            core.setOutput('run_url', manifest.runUrl || '');
            core.setOutput('image_digest', manifest.image.digest);
            core.setOutput('image_reference', manifest.image.canonicalReference || '');

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.candidate_manifest.outputs.commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
