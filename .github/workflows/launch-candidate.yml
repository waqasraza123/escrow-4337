name: Launch Candidate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to validate
        required: true
        type: choice
        options:
          - staging
          - production
      candidate_run_id:
        description: CI workflow run id that published the candidate API image manifest
        required: true
        type: string
      rollback_image_sha:
        description: Rollback image SHA if one is already designated
        required: false
        type: string

jobs:
  launch-candidate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      actions: read
      contents: read
    env:
      DEPLOYMENT_TARGET_ENVIRONMENT: ${{ inputs.environment }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SSL: ${{ secrets.DATABASE_SSL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
      JWT_ACCESS_TTL_SEC: ${{ secrets.JWT_ACCESS_TTL_SEC }}
      JWT_REFRESH_TTL_SEC: ${{ secrets.JWT_REFRESH_TTL_SEC }}
      AUTH_SESSION_TTL_SEC: ${{ secrets.AUTH_SESSION_TTL_SEC }}
      AUTH_OTP_TTL_SEC: ${{ secrets.AUTH_OTP_TTL_SEC }}
      AUTH_OTP_VERIFY_MAX_ATTEMPTS: ${{ secrets.AUTH_OTP_VERIFY_MAX_ATTEMPTS }}
      AUTH_OTP_LOCK_SEC: ${{ secrets.AUTH_OTP_LOCK_SEC }}
      AUTH_OTP_SEND_WINDOW_SEC: ${{ secrets.AUTH_OTP_SEND_WINDOW_SEC }}
      AUTH_OTP_SEND_MAX_PER_WINDOW: ${{ secrets.AUTH_OTP_SEND_MAX_PER_WINDOW }}
      AUTH_OTP_IP_SEND_WINDOW_SEC: ${{ secrets.AUTH_OTP_IP_SEND_WINDOW_SEC }}
      AUTH_OTP_IP_SEND_MAX_PER_WINDOW: ${{ secrets.AUTH_OTP_IP_SEND_MAX_PER_WINDOW }}
      AUTH_EMAIL_MODE: ${{ secrets.AUTH_EMAIL_MODE }}
      AUTH_EMAIL_FROM_EMAIL: ${{ secrets.AUTH_EMAIL_FROM_EMAIL }}
      AUTH_EMAIL_FROM_NAME: ${{ secrets.AUTH_EMAIL_FROM_NAME }}
      AUTH_EMAIL_REPLY_TO: ${{ secrets.AUTH_EMAIL_REPLY_TO }}
      AUTH_EMAIL_RELAY_BASE_URL: ${{ secrets.AUTH_EMAIL_RELAY_BASE_URL }}
      AUTH_EMAIL_RELAY_API_KEY: ${{ secrets.AUTH_EMAIL_RELAY_API_KEY }}
      AUTH_EMAIL_OTP_SUBJECT: ${{ secrets.AUTH_EMAIL_OTP_SUBJECT }}
      WALLET_SMART_ACCOUNT_MODE: ${{ secrets.WALLET_SMART_ACCOUNT_MODE }}
      WALLET_SMART_ACCOUNT_CHAIN_ID: ${{ secrets.WALLET_SMART_ACCOUNT_CHAIN_ID }}
      WALLET_SMART_ACCOUNT_ENTRY_POINT_ADDRESS: ${{ secrets.WALLET_SMART_ACCOUNT_ENTRY_POINT_ADDRESS }}
      WALLET_SMART_ACCOUNT_FACTORY_ADDRESS: ${{ secrets.WALLET_SMART_ACCOUNT_FACTORY_ADDRESS }}
      WALLET_SMART_ACCOUNT_BUNDLER_URL: ${{ secrets.WALLET_SMART_ACCOUNT_BUNDLER_URL }}
      WALLET_SMART_ACCOUNT_RELAY_BASE_URL: ${{ secrets.WALLET_SMART_ACCOUNT_RELAY_BASE_URL }}
      WALLET_SMART_ACCOUNT_RELAY_API_KEY: ${{ secrets.WALLET_SMART_ACCOUNT_RELAY_API_KEY }}
      WALLET_SMART_ACCOUNT_SPONSORSHIP_MODE: ${{ secrets.WALLET_SMART_ACCOUNT_SPONSORSHIP_MODE }}
      WALLET_SMART_ACCOUNT_PAYMASTER_URL: ${{ secrets.WALLET_SMART_ACCOUNT_PAYMASTER_URL }}
      ESCROW_CONTRACT_MODE: ${{ secrets.ESCROW_CONTRACT_MODE }}
      ESCROW_CHAIN_ID: ${{ secrets.ESCROW_CHAIN_ID }}
      ESCROW_CONTRACT_ADDRESS: ${{ secrets.ESCROW_CONTRACT_ADDRESS }}
      ESCROW_ARBITRATOR_ADDRESS: ${{ secrets.ESCROW_ARBITRATOR_ADDRESS }}
      ESCROW_RELAY_BASE_URL: ${{ secrets.ESCROW_RELAY_BASE_URL }}
      ESCROW_RELAY_API_KEY: ${{ secrets.ESCROW_RELAY_API_KEY }}
      NEST_API_TRUST_PROXY: ${{ secrets.NEST_API_TRUST_PROXY }}
      OPERATIONS_ESCROW_RPC_URL: ${{ secrets.OPERATIONS_ESCROW_RPC_URL }}
      OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_REQUIRED: ${{ secrets.OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_REQUIRED }}
      OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_ALERT_WEBHOOK_URL: ${{ secrets.OPERATIONS_ESCROW_BATCH_SYNC_DAEMON_ALERT_WEBHOOK_URL }}
      PLAYWRIGHT_DEPLOYED_WEB_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_WEB_BASE_URL }}
      PLAYWRIGHT_DEPLOYED_ADMIN_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_ADMIN_BASE_URL }}
      PLAYWRIGHT_DEPLOYED_API_BASE_URL: ${{ secrets.PLAYWRIGHT_DEPLOYED_API_BASE_URL }}
      PLAYWRIGHT_DEPLOYED_EXPECT_PROFILE: ${{ secrets.PLAYWRIGHT_DEPLOYED_EXPECT_PROFILE }}
      PLAYWRIGHT_DEPLOYED_EXPECT_LAUNCH_READY: 'true'
      PLAYWRIGHT_DEPLOYED_AUDIT_JOB_ID: ${{ secrets.PLAYWRIGHT_DEPLOYED_AUDIT_JOB_ID }}
      PLAYWRIGHT_DEPLOYED_ALLOW_INSECURE_HTTP: ${{ secrets.PLAYWRIGHT_DEPLOYED_ALLOW_INSECURE_HTTP }}
      PLAYWRIGHT_DEPLOYED_ALLOW_LOCALHOST: ${{ secrets.PLAYWRIGHT_DEPLOYED_ALLOW_LOCALHOST }}
      PLAYWRIGHT_DEPLOYED_FLOW_CURRENCY_ADDRESS: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CURRENCY_ADDRESS }}
      PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_EMAIL }}
      PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_OTP_CODE }}
      PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CLIENT_PRIVATE_KEY }}
      PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_EMAIL }}
      PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_OTP_CODE }}
      PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_CONTRACTOR_PRIVATE_KEY }}
      PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_EMAIL: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_EMAIL }}
      PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_OTP_CODE: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_OTP_CODE }}
      PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_PRIVATE_KEY: ${{ secrets.PLAYWRIGHT_DEPLOYED_FLOW_OPERATOR_PRIVATE_KEY }}
      LAUNCH_CANDIDATE_ARTIFACT_DIR: artifacts/launch-candidate/${{ github.run_id }}-${{ github.run_attempt }}
      LAUNCH_CANDIDATE_ENVIRONMENT: ${{ inputs.environment }}
      LAUNCH_CANDIDATE_REPOSITORY: ${{ github.repository }}
      LAUNCH_CANDIDATE_WORKFLOW: ${{ github.workflow }}
      LAUNCH_CANDIDATE_CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
      LAUNCH_CANDIDATE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      LAUNCH_CANDIDATE_ACTOR: ${{ github.actor }}
    steps:
      - name: Download API image manifest
        uses: actions/download-artifact@v4
        with:
          name: api-image-manifest
          path: ${{ runner.temp }}/api-image-manifest
          run-id: ${{ inputs.candidate_run_id }}
          github-token: ${{ github.token }}

      - name: Read candidate image manifest
        id: candidate_manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/api-image-manifest/manifest.json`, 'utf8'));
            core.setOutput('commit_sha', manifest.commitSha);
            core.setOutput('git_ref', manifest.gitRef || '');
            core.setOutput('run_url', manifest.runUrl || '');
            core.setOutput('image_digest', manifest.image.digest);
            core.setOutput('image_reference', manifest.image.canonicalReference || '');

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.candidate_manifest.outputs.commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Resolve API image manifest
        run: |
          node ./scripts/api-image-manifest.mjs resolve \
            --manifest "${{ runner.temp }}/api-image-manifest/manifest.json" \
            --expected-repository "${{ github.repository }}" \
            --expected-commit-sha "${{ steps.candidate_manifest.outputs.commit_sha }}" \
            --expected-run-id "${{ inputs.candidate_run_id }}"

      - name: Resolve rollback release pointer selection
        if: inputs.environment == 'production' && inputs.rollback_image_sha == ''
        id: rollback_release_pointer_selection
        run: |
          node ./scripts/release-pointer.mjs resolve \
            --environment "${{ inputs.environment }}" \
            --write-env "$RUNNER_TEMP/release-pointer-selection.env"
          cat "$RUNNER_TEMP/release-pointer-selection.env" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Download rollback release pointer artifact
        if: inputs.environment == 'production' && inputs.rollback_image_sha == ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.rollback_release_pointer_selection.outputs.RELEASE_POINTER_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/release-pointer
          run-id: ${{ steps.rollback_release_pointer_selection.outputs.RELEASE_POINTER_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Validate rollback release pointer
        if: inputs.environment == 'production' && inputs.rollback_image_sha == ''
        id: rollback_release_pointer
        run: |
          node ./scripts/release-pointer.mjs validate \
            --pointer "${{ runner.temp }}/release-pointer/release-pointer.json" \
            --expected-environment "${{ inputs.environment }}" \
            --require-ready-launch-posture \
            --write-env "$RUNNER_TEMP/release-pointer.env"
          cat "$RUNNER_TEMP/release-pointer.env" >> "$GITHUB_OUTPUT"

      - name: Summarize rollback release pointer posture
        if: inputs.environment == 'production' && inputs.rollback_image_sha == ''
        shell: bash
        run: |
          {
            echo "## Rollback Release Pointer"
            echo
            echo "- Candidate run ID: $RELEASE_POINTER_CANDIDATE_RUN_ID"
            echo "- Commit SHA: $RELEASE_POINTER_COMMIT_SHA"
            echo "- Image digest: $RELEASE_POINTER_IMAGE_DIGEST"
            echo "- Launch status: $RELEASE_POINTER_LAUNCH_STATUS"
            echo "- Launch ready: $RELEASE_POINTER_LAUNCH_READY"
            echo "- Launch evidence complete: $RELEASE_POINTER_LAUNCH_EVIDENCE_COMPLETE"
            echo "- Marketplace origin proof: $RELEASE_POINTER_LAUNCH_MARKETPLACE_ORIGIN_OK"
            echo "- Exact marketplace lane proof: $RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_LANE_PROOF_OK"
            echo "- Exact client lane switched: $RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_CLIENT_LANE_SWITCHED"
            echo "- Exact freelancer lane switched: $RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_FREELANCER_LANE_SWITCHED"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          RELEASE_POINTER_CANDIDATE_RUN_ID: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_CANDIDATE_RUN_ID }}
          RELEASE_POINTER_COMMIT_SHA: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_COMMIT_SHA }}
          RELEASE_POINTER_IMAGE_DIGEST: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_IMAGE_DIGEST }}
          RELEASE_POINTER_LAUNCH_STATUS: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_LAUNCH_STATUS }}
          RELEASE_POINTER_LAUNCH_READY: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_LAUNCH_READY }}
          RELEASE_POINTER_LAUNCH_EVIDENCE_COMPLETE: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_LAUNCH_EVIDENCE_COMPLETE }}
          RELEASE_POINTER_LAUNCH_MARKETPLACE_ORIGIN_OK: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_LAUNCH_MARKETPLACE_ORIGIN_OK }}
          RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_LANE_PROOF_OK: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_LANE_PROOF_OK }}
          RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_CLIENT_LANE_SWITCHED: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_CLIENT_LANE_SWITCHED }}
          RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_FREELANCER_LANE_SWITCHED: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_FREELANCER_LANE_SWITCHED }}

      - name: Resolve rollback image SHA
        id: rollback_image
        shell: bash
        run: |
          rollback_image_sha="$ROLLBACK_IMAGE_INPUT"
          rollback_source="input"
          if [ -z "$rollback_image_sha" ]; then
            rollback_image_sha="$ROLLBACK_IMAGE_RESOLVED"
            rollback_source="release-pointer"
          fi

          if [ -z "$rollback_image_sha" ] && [ "$ROLLBACK_REQUIRED" = "true" ]; then
            echo "Rollback image SHA is required for production launch candidates." >&2
            exit 1
          fi

          echo "rollback_image_sha=$rollback_image_sha" >> "$GITHUB_OUTPUT"
          echo "rollback_source=$rollback_source" >> "$GITHUB_OUTPUT"
        env:
          ROLLBACK_IMAGE_INPUT: ${{ inputs.rollback_image_sha }}
          ROLLBACK_IMAGE_RESOLVED: ${{ steps.rollback_release_pointer.outputs.RELEASE_POINTER_IMAGE_DIGEST }}
          ROLLBACK_REQUIRED: ${{ inputs.environment == 'production' }}

      - name: Run launch candidate suite
        run: pnpm launch:candidate
        env:
          LAUNCH_CANDIDATE_COMMIT_SHA: ${{ steps.candidate_manifest.outputs.commit_sha }}
          LAUNCH_CANDIDATE_GIT_REF: ${{ steps.candidate_manifest.outputs.git_ref }}
          LAUNCH_CANDIDATE_CANDIDATE_RUN_URL: ${{ steps.candidate_manifest.outputs.run_url }}
          LAUNCH_CANDIDATE_DEPLOYED_IMAGE_SHA: ${{ steps.candidate_manifest.outputs.image_digest }}
          LAUNCH_CANDIDATE_DEPLOYED_IMAGE_REFERENCE: ${{ steps.candidate_manifest.outputs.image_reference }}
          LAUNCH_CANDIDATE_ROLLBACK_IMAGE_SHA: ${{ steps.rollback_image.outputs.rollback_image_sha }}
          LAUNCH_CANDIDATE_ROLLBACK_SOURCE: ${{ steps.rollback_image.outputs.rollback_source }}
          LAUNCH_CANDIDATE_ROLLBACK_POINTER_RUN_ID: ${{ steps.rollback_release_pointer_selection.outputs.RELEASE_POINTER_RUN_ID }}
          LAUNCH_CANDIDATE_ROLLBACK_POINTER_ARTIFACT_NAME: ${{ steps.rollback_release_pointer_selection.outputs.RELEASE_POINTER_ARTIFACT_NAME }}
          LAUNCH_CANDIDATE_ROLLBACK_POINTER_SELECTION_SOURCE: ${{ steps.rollback_release_pointer_selection.outputs.RELEASE_POINTER_SELECTION_SOURCE }}
          LAUNCH_CANDIDATE_ROLLBACK_POINTER_ARTIFACT_ID: ${{ steps.rollback_release_pointer_selection.outputs.RELEASE_POINTER_ARTIFACT_ID }}
          LAUNCH_CANDIDATE_ROLLBACK_POINTER_SELECTED_CREATED_AT: ${{ steps.rollback_release_pointer_selection.outputs.RELEASE_POINTER_SELECTED_CREATED_AT }}

      - name: Validate launch candidate review bundle
        if: always()
        run: |
          node ./scripts/release-dossier.mjs validate-source-dir \
            --source launchCandidateReview \
            --dir "${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}"

      - name: Validate launch candidate artifact bundle
        if: always()
        id: validate_launch_candidate_artifacts
        run: |
          node ./scripts/launch-candidate.mjs validate-artifacts \
            --artifacts-dir "${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}"

      - name: Upload launch candidate artifacts
        if: always() && steps.validate_launch_candidate_artifacts.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: launch-candidate-${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}
          if-no-files-found: error

      - name: Upload launch candidate review artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: launch-candidate-review-${{ inputs.environment }}-candidate-${{ inputs.candidate_run_id }}
          path: |
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/evidence-manifest.json
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/launch-evidence-posture.json
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/marketplace-origin-summary.json
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/marketplace-seeded-evidence.json
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/marketplace-exact-evidence.json
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/promotion-record.json
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/promotion-record.md
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/provider-validation-summary.json
            ${{ env.LAUNCH_CANDIDATE_ARTIFACT_DIR }}/summary.md
          if-no-files-found: error
