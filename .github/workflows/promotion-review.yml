name: Promotion Review

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub environment whose staged evidence is being reviewed
        required: true
        type: choice
        options:
          - staging
          - production
      candidate_run_id:
        description: CI workflow run id that published the candidate API image manifest
        required: true
        type: string
      deployed_smoke_run_id:
        description: Optional override for the Deployed Smoke workflow run id; omit to auto-discover the newest matching review artifact
        required: false
        type: string
      launch_candidate_run_id:
        description: Optional override for the Launch Candidate workflow run id; omit to auto-discover the newest matching review artifact
        required: false
        type: string

jobs:
  promotion-review:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve review artifact selections
        id: review_artifacts
        run: |
          node ./scripts/release-review-selection.mjs resolve \
            --environment "${{ inputs.environment }}" \
            --candidate-run-id "${{ inputs.candidate_run_id }}" \
            ${DEPLOYED_SMOKE_RUN_ID:+--deployed-smoke-run-id "$DEPLOYED_SMOKE_RUN_ID"} \
            ${LAUNCH_CANDIDATE_RUN_ID:+--launch-candidate-run-id "$LAUNCH_CANDIDATE_RUN_ID"} \
            --write-env "$RUNNER_TEMP/promotion-review-selection.env"
          cat "$RUNNER_TEMP/promotion-review-selection.env" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOYED_SMOKE_RUN_ID: ${{ inputs.deployed_smoke_run_id }}
          LAUNCH_CANDIDATE_RUN_ID: ${{ inputs.launch_candidate_run_id }}

      - name: Download API image manifest
        uses: actions/download-artifact@v4
        with:
          name: api-image-manifest
          path: ${{ runner.temp }}/api-image-manifest
          run-id: ${{ inputs.candidate_run_id }}
          github-token: ${{ github.token }}

      - name: Download deployed smoke review artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_DEPLOYED_SMOKE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/deployed-smoke-review
          run-id: ${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_DEPLOYED_SMOKE_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Download launch candidate review artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_LAUNCH_CANDIDATE_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/launch-candidate-review
          run-id: ${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_LAUNCH_CANDIDATE_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Read candidate image manifest
        id: candidate_manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/api-image-manifest/manifest.json`, 'utf8'));
            core.setOutput('commit_sha', manifest.commitSha);

      - name: Checkout candidate commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.candidate_manifest.outputs.commit_sha }}

      - name: Resolve API image manifest
        run: |
          node ./scripts/api-image-manifest.mjs resolve \
            --manifest "${{ runner.temp }}/api-image-manifest/manifest.json" \
            --expected-repository "${{ github.repository }}" \
            --expected-commit-sha "${{ steps.candidate_manifest.outputs.commit_sha }}" \
            --expected-run-id "${{ inputs.candidate_run_id }}"

      - name: Validate downloaded review source bundles
        run: |
          node ./scripts/release-dossier.mjs validate-source-dir \
            --source imageManifest \
            --dir "${{ runner.temp }}/api-image-manifest"
          node ./scripts/release-dossier.mjs validate-source-dir \
            --source deployedSmokeReview \
            --dir "${{ runner.temp }}/deployed-smoke-review"
          node ./scripts/release-dossier.mjs validate-source-dir \
            --source launchCandidateReview \
            --dir "${{ runner.temp }}/launch-candidate-review"

      - name: Run promotion review
        run: |
          node ./scripts/promotion-review.mjs review \
            --image-manifest "${{ runner.temp }}/api-image-manifest/manifest.json" \
            --deployed-smoke-record "${{ runner.temp }}/deployed-smoke-review/deployed-smoke-record.json" \
            --launch-promotion-record "${{ runner.temp }}/launch-candidate-review/promotion-record.json" \
            --launch-evidence-manifest "${{ runner.temp }}/launch-candidate-review/evidence-manifest.json" \
            --launch-evidence-posture "${{ runner.temp }}/launch-candidate-review/launch-evidence-posture.json" \
            --output-dir artifacts/promotion-review \
            --expected-environment "${{ inputs.environment }}" \
            --expected-repository "${{ github.repository }}" \
            --expected-candidate-run-id "${{ inputs.candidate_run_id }}" \
            --expected-smoke-run-id "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_DEPLOYED_SMOKE_RUN_ID }}" \
            --expected-launch-run-id "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_LAUNCH_CANDIDATE_RUN_ID }}" \
            --deployed-smoke-selection-source "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_DEPLOYED_SMOKE_SELECTION_SOURCE }}" \
            --deployed-smoke-artifact-id "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_DEPLOYED_SMOKE_ARTIFACT_ID }}" \
            --deployed-smoke-artifact-name "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_DEPLOYED_SMOKE_ARTIFACT_NAME }}" \
            --deployed-smoke-created-at "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_DEPLOYED_SMOKE_CREATED_AT }}" \
            --launch-candidate-selection-source "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_LAUNCH_CANDIDATE_SELECTION_SOURCE }}" \
            --launch-candidate-artifact-id "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_LAUNCH_CANDIDATE_ARTIFACT_ID }}" \
            --launch-candidate-artifact-name "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_LAUNCH_CANDIDATE_ARTIFACT_NAME }}" \
            --launch-candidate-created-at "${{ steps.review_artifacts.outputs.PROMOTION_REVIEW_LAUNCH_CANDIDATE_CREATED_AT }}"

      - name: Validate release dossier source bundles
        id: validate_release_dossier_sources
        if: always()
        run: |
          node ./scripts/release-dossier.mjs validate-sources \
            --image-manifest-dir "${{ runner.temp }}/api-image-manifest" \
            --deployed-smoke-dir "${{ runner.temp }}/deployed-smoke-review" \
            --launch-review-dir "${{ runner.temp }}/launch-candidate-review" \
            --promotion-review-dir artifacts/promotion-review

      - name: Generate release dossier
        if: always() && steps.validate_release_dossier_sources.outcome == 'success'
        run: |
          node ./scripts/release-dossier.mjs \
            --image-manifest-dir "${{ runner.temp }}/api-image-manifest" \
            --deployed-smoke-dir "${{ runner.temp }}/deployed-smoke-review" \
            --launch-review-dir "${{ runner.temp }}/launch-candidate-review" \
            --promotion-review-dir artifacts/promotion-review \
            --output-dir artifacts/release-dossier
        env:
          RELEASE_DOSSIER_ENVIRONMENT: ${{ inputs.environment }}
          RELEASE_DOSSIER_REPOSITORY: ${{ github.repository }}
          RELEASE_DOSSIER_WORKFLOW: ${{ github.workflow }}
          RELEASE_DOSSIER_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_DOSSIER_ACTOR: ${{ github.actor }}

      - name: Generate release pointer
        if: success()
        run: |
          node ./scripts/release-pointer.mjs generate \
            --release-dossier artifacts/release-dossier/release-dossier.json \
            --output-dir artifacts/release-pointer

      - name: Validate generated release pointer
        if: success()
        id: release_pointer
        run: |
          node ./scripts/release-pointer.mjs validate \
            --pointer artifacts/release-pointer/release-pointer.json \
            --expected-environment "${{ inputs.environment }}" \
            --require-ready-launch-posture \
            --write-env "$RUNNER_TEMP/release-pointer.env"
          cat "$RUNNER_TEMP/release-pointer.env" >> "$GITHUB_OUTPUT"

      - name: Summarize release pointer posture
        if: success()
        shell: bash
        run: |
          {
            echo "## Release Pointer"
            echo
            echo "- Environment: $RELEASE_POINTER_ENVIRONMENT"
            echo "- Candidate run ID: $RELEASE_POINTER_CANDIDATE_RUN_ID"
            echo "- Commit SHA: $RELEASE_POINTER_COMMIT_SHA"
            echo "- Image digest: $RELEASE_POINTER_IMAGE_DIGEST"
            echo "- Launch status: $RELEASE_POINTER_LAUNCH_STATUS"
            echo "- Launch ready: $RELEASE_POINTER_LAUNCH_READY"
            echo "- Launch evidence complete: $RELEASE_POINTER_LAUNCH_EVIDENCE_COMPLETE"
            echo "- Marketplace origin proof: $RELEASE_POINTER_LAUNCH_MARKETPLACE_ORIGIN_OK"
            echo "- Exact marketplace lane proof: $RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_LANE_PROOF_OK"
            echo "- Exact client lane switched: $RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_CLIENT_LANE_SWITCHED"
            echo "- Exact freelancer lane switched: $RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_FREELANCER_LANE_SWITCHED"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          RELEASE_POINTER_ENVIRONMENT: ${{ steps.release_pointer.outputs.RELEASE_POINTER_ENVIRONMENT }}
          RELEASE_POINTER_CANDIDATE_RUN_ID: ${{ steps.release_pointer.outputs.RELEASE_POINTER_CANDIDATE_RUN_ID }}
          RELEASE_POINTER_COMMIT_SHA: ${{ steps.release_pointer.outputs.RELEASE_POINTER_COMMIT_SHA }}
          RELEASE_POINTER_IMAGE_DIGEST: ${{ steps.release_pointer.outputs.RELEASE_POINTER_IMAGE_DIGEST }}
          RELEASE_POINTER_LAUNCH_STATUS: ${{ steps.release_pointer.outputs.RELEASE_POINTER_LAUNCH_STATUS }}
          RELEASE_POINTER_LAUNCH_READY: ${{ steps.release_pointer.outputs.RELEASE_POINTER_LAUNCH_READY }}
          RELEASE_POINTER_LAUNCH_EVIDENCE_COMPLETE: ${{ steps.release_pointer.outputs.RELEASE_POINTER_LAUNCH_EVIDENCE_COMPLETE }}
          RELEASE_POINTER_LAUNCH_MARKETPLACE_ORIGIN_OK: ${{ steps.release_pointer.outputs.RELEASE_POINTER_LAUNCH_MARKETPLACE_ORIGIN_OK }}
          RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_LANE_PROOF_OK: ${{ steps.release_pointer.outputs.RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_LANE_PROOF_OK }}
          RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_CLIENT_LANE_SWITCHED: ${{ steps.release_pointer.outputs.RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_CLIENT_LANE_SWITCHED }}
          RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_FREELANCER_LANE_SWITCHED: ${{ steps.release_pointer.outputs.RELEASE_POINTER_LAUNCH_MARKETPLACE_EXACT_FREELANCER_LANE_SWITCHED }}

      - name: Validate promotion review bundle
        if: always()
        id: validate_promotion_review_bundle
        run: |
          node ./scripts/release-dossier.mjs validate-source-dir \
            --source promotionReview \
            --dir artifacts/promotion-review

      - name: Upload promotion review artifact
        if: always() && steps.validate_promotion_review_bundle.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: promotion-review-${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/promotion-review
          if-no-files-found: error

      - name: Upload release dossier artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dossier-${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/release-dossier
          if-no-files-found: error

      - name: Upload release pointer artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-pointer-${{ inputs.environment }}
          path: artifacts/release-pointer
          if-no-files-found: error
