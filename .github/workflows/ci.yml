name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Start local Postgres
        run: pnpm db:up

      - name: Wait for local Postgres
        run: timeout 60 sh -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" escrow4337-postgres 2>/dev/null)" = "healthy" ]; do sleep 1; done'

      - name: Verify repo
        run: pnpm verify:ci

  build-api-image:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/escrow-4337-api
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and publish API image
        id: build_api_image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate API image manifest
        env:
          API_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/escrow-4337-api
          API_IMAGE_DIGEST: ${{ steps.build_api_image.outputs.digest }}
          API_IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node ./scripts/api-image-manifest.mjs generate --output-dir artifacts/api-image-manifest

      - name: Upload API image manifest
        uses: actions/upload-artifact@v4
        with:
          name: api-image-manifest
          path: artifacts/api-image-manifest
          if-no-files-found: error
