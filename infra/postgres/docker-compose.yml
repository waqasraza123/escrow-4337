services:
  postgres:
    image: postgres:16.4-alpine
    container_name: escrow4337-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-escrow4337}"
      POSTGRES_USER: "${POSTGRES_USER:-escrow4337}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-escrow4337}"
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - wal_level=replica
      - -c
      - log_min_duration_statement=250ms
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-escrow4337} -d ${POSTGRES_DB:-escrow4337}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
